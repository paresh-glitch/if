name: if condition

on:
  push:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: install and test
        run: |
          cd app
          npm install
          npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: deploy
        run: |
          echo "deploying to productions"
          echo "Branch: ${{ github.ref_name }}"
    
  on-success:
    runs-on: ubuntu-latest
    needs: [test]
    if: success()
    steps:
      - name: success handler
        run: |
          echo "SUCCESS — everything passed!"
          echo "test result: ${{ needs.test.result }}"

  on-failure:
    runs-on: ubuntu-latest
    needs: [test]
    if: failure()
    steps:
      - name: failure handler
        run: |
          echo "FAILURE — something broken!"
          echo "test result: ${{ needs.test.result }}"

# ❌ add deploy to needs — wrong pattern!
  on-always:
    runs-on: ubuntu-latest
    needs: [test, deploy]    # deploy is conditional!
    if: always()
    steps:
      - name: Always handler
        run: echo "I thought I always run!"
